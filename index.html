<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BATMAN (Official)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,sans-serif;
min-height:100vh;
display:flex;justify-content:center;align-items:center;
background:radial-gradient(circle at top,#0b2a5b,#02060d 60%);
overflow:hidden;
}
.card{
width:92%;max-width:520px;
background:rgba(0,0,0,.55);
backdrop-filter:blur(12px);
border-radius:28px;
padding:30px;
text-align:center;
box-shadow:0 0 40px rgba(0,140,255,.25);
animation:fade .8s ease;
}
.dp{
width:140px;height:140px;border-radius:50%;
border:5px solid #ffd400;
padding:4px;margin:auto;
box-shadow:0 0 25px #ffd400;
}
.dp img{width:100%;height:100%;border-radius:50%;object-fit:cover}
h1{color:#ffd400;margin-top:18px}
p{color:#ddd;margin-top:8px}
.timer{font-size:64px;color:#00cfff;font-weight:bold;margin:25px 0}
.btn{
display:inline-block;
padding:16px 34px;
background:linear-gradient(90deg,#005cff,#1f8bff);
border-radius:40px;
color:#fff;text-decoration:none;font-weight:bold;
box-shadow:0 0 25px rgba(0,120,255,.6);
animation:pulse 2s infinite;
}
.features{margin:24px 0;color:#fff;line-height:1.9}
.small{font-size:12px;color:#9ca3af;margin-top:20px}
@keyframes pulse{50%{transform:scale(1.05)}}
@keyframes fade{from{opacity:0;transform:translateY(20px)}to{opacity:1}}
</style>
</head>
<body>
<div class="card">
<div class="dp"><img src="batman.jpg"></div>
<h1>BATMAN (Official)</h1>
<p>Premium cricket updates, analysis and insights</p>
<div class="timer" id="timer">60</div>
<a class="btn" href="https://t.me/+yc83dCl8Wbw2YTZl">JOIN THE CHANNEL NOW</a>
<div class="features">
✔ Trusted Community<br>
✔ Fast Match Updates<br>
✔ Premium Analysis
</div>
<div class="small">
This channel shares cricket updates and information. Verify information independently.
</div>
</div>
<script>
let t=60;
const el=document.getElementById('timer');
const i=setInterval(()=>{
t--; el.innerText=t;
if(t<=0){
clearInterval(i);
window.location.href='https://t.me/+yc83dCl8Wbw2YTZl';
}
},1000);
</script>
</body>
</html>
